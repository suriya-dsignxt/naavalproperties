<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naaval Properties | Secure Document Viewer</title>
    <meta name="description" content="View your document securely on Naaval Properties. High-quality document preview and secure access.">
    <link rel="stylesheet" href="style.css">
    <!-- Inline simple SVG favicon to resolve 404 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
</head>
<body>
  

    <main>
        <div class="image-container" id="container">
            <div class="loading-shimmer" id="shimmer"></div>
            <img src="naaval.jpg" alt="Secure Document Preview" id="naaval-image" style="opacity: 0;">
        </div>
    </main>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const img = document.getElementById('naaval-image');
            const shimmer = document.getElementById('shimmer');
            const container = document.getElementById('container');

            if (img) {
                const handleLoad = () => {
                    if (shimmer) shimmer.style.display = 'none';
                    img.style.opacity = '1';
                    if (container) container.style.opacity = '1';
                };

                if (img.complete) {
                    handleLoad();
                } else {
                    img.onload = handleLoad;
                }

                // Error handling
                img.onerror = () => {
                    if (shimmer) shimmer.style.display = 'none';
                    console.error('Failed to load document image.');
                };
            }
        });
    </script>
</body>
</html>
